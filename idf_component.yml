## =============================================================================
## IDF Component: rodrigo-s-lange/esp_network
## Registry:      https://components.espressif.com/components/rodrigo-s-lange/esp_network
## Repository:    https://github.com/rodrigo-s-lange/esp-network
## =============================================================================
##
## ⚠  DEPENDÊNCIA INTERNA — requer rodrigo-s-lange/esp_at
##
##   Registry:    rodrigo-s-lange/esp_at >= 1.0.0
##   Repositório: https://github.com/rodrigo-s-lange/esp-at
##
##   esp_at_init() DEVE ser chamado antes de esp_network_init().
##
## Compatível com: esp32 | esp32-c3 | esp32-c6 | esp32-s3
##
## Para usar em outro projeto:
##   Via registry:  idf.py add-dependency "rodrigo-s-lange/esp_network>=1.0.0"
##                  idf.py add-dependency "rodrigo-s-lange/esp_at>=1.0.0"
##   Via submodule: git submodule add https://github.com/rodrigo-s-lange/esp-at.git      components/esp_at
##                  git submodule add https://github.com/rodrigo-s-lange/esp-network.git  components/esp_network
##
## No código:
##   #include "esp_at.h"
##   #include "esp_network.h"
##   nvs_flash_init();
##   esp_at_init();
##   esp_network_init();
##   esp_network_start();
## =============================================================================

version: "1.0.0"

description: >
  WiFi Station layer with NVS credential persistence (namespace "net"),
  static/DHCP IP selection, mDNS hostname, and 8 AT commands for
  runtime configuration. Non-blocking reconnect via esp_timer.
  Requires rodrigo-s-lange/esp_at.

url: "https://github.com/rodrigo-s-lange/esp-network"
repository: "https://github.com/rodrigo-s-lange/esp-network.git"

license: "MIT"

targets:
  - esp32
  - esp32c3
  - esp32c6
  - esp32s3

dependencies:
  idf:
    version: ">=5.0.0"
  espressif/mdns:
    version: ">=1.0.0"
  ## Quando rodrigo-s-lange/esp_at estiver publicado no registry, descomentar:
  # rodrigo-s-lange/esp_at:
  #   version: ">=1.0.0"
  ## Durante desenvolvimento local (submodule em components/esp_at), não é necessário.
